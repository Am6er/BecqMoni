name: Version Release

on:
  push:
    tags:
      - '*.*.*.*'

permissions:
  contents: write

concurrency:
  group: version-release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate master branch
        shell: pwsh
        run: |
          git fetch origin master --force
          $tagCommit = (git rev-parse '${{ github.sha }}').Trim()
          $masterCommit = (git rev-parse 'origin/master').Trim()

          if ($tagCommit -ne $masterCommit) {
            throw "Release tag '${{ github.ref_name }}' must point to the current origin/master HEAD. Tag commit: $tagCommit. origin/master: $masterCommit."
          }

      - name: Validate release tag
        id: validate
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'
          if ($tag -notmatch '^\d{4}\.\d{1,2}\.\d{1,2}\.\d+$') {
            throw "Tag '$tag' does not match the supported release format year.month.day.number."
          }

          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "title=BecqMoni $tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "asset_name=BecqMoni-$tag.zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build release
        shell: pwsh
        run: |
          msbuild BecquerelMonitor.sln /restore /t:Rebuild /p:Configuration=Release /p:Platform="Any CPU" /p:GenerateManifests=false /p:SignManifests=false

      - name: Prepare zip package
        id: package
        shell: pwsh
        run: |
          $tag = '${{ steps.validate.outputs.tag }}'
          $stageDir = Join-Path $env:RUNNER_TEMP "BecqMoni-$tag"
          $stageConfigDir = Join-Path $stageDir 'config'
          $zipPath = Join-Path $env:RUNNER_TEMP '${{ steps.validate.outputs.asset_name }}'

          if (Test-Path $stageDir) {
            Remove-Item -LiteralPath $stageDir -Recurse -Force
          }

          if (Test-Path $zipPath) {
            Remove-Item -LiteralPath $zipPath -Force
          }

          New-Item -ItemType Directory -Path $stageDir | Out-Null
          Copy-Item -Path 'BecquerelMonitor\bin\Release\*' -Destination $stageDir -Recurse -Force

          New-Item -ItemType Directory -Path $stageConfigDir -Force | Out-Null
          Copy-Item -Path 'BecquerelMonitor\config\*' -Destination $stageConfigDir -Recurse -Force

          Compress-Archive -Path (Join-Path $stageDir '*') -DestinationPath $zipPath -CompressionLevel Optimal

          "zip_path=$zipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Generate release notes
        id: notes
        shell: pwsh
        run: |
          $notesPath = Join-Path $env:RUNNER_TEMP 'version-release-notes.md'
          .\.github\scripts\Get-VersionReleaseNotes.ps1 `
            -TagName '${{ steps.validate.outputs.tag }}' `
            -BeforeSha '${{ github.event.before }}' `
            -AfterSha '${{ github.sha }}' `
            -RunUrl '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}' `
            -OutputPath $notesPath

          "notes_path=$notesPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = '${{ steps.validate.outputs.tag }}'
          $title = '${{ steps.validate.outputs.title }}'
          $asset = '${{ steps.package.outputs.zip_path }}'
          $assetName = '${{ steps.validate.outputs.asset_name }}'
          $notesFile = '${{ steps.notes.outputs.notes_path }}'
          $payloadPath = Join-Path $env:RUNNER_TEMP 'version-release-payload.json'
          $notes = Get-Content -Path $notesFile -Raw

          $payload = @{
            tag_name = $tag
            name = $title
            body = $notes
            draft = $false
            prerelease = $false
          }

          $payload | ConvertTo-Json -Depth 5 | Set-Content -Path $payloadPath -Encoding utf8

          $releaseJson = gh api "repos/${{ github.repository }}/releases/tags/$tag" 2>$null
          if ($LASTEXITCODE -eq 0) {
            $releaseId = ($releaseJson | ConvertFrom-Json).id
            gh api "repos/${{ github.repository }}/releases/$releaseId" --method PATCH --input $payloadPath | Out-Null
          }
          else {
            gh api "repos/${{ github.repository }}/releases" --method POST --input $payloadPath | Out-Null
          }

          gh release upload $tag "$asset#$assetName" --clobber
